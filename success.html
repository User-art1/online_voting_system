<!DOCTYPE html>
<html>
<head>
<title>Vote Submitted</title>

<link rel="stylesheet" href="style.css">

<style>
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('https://i.pinimg.com/1200x/40/e9/1d/40e91d18406c23a5551a3c3d628ed39e.jpg');
background-size:cover;
font-family:Arial;
text-align:center;
color:white;
}

button{
padding:12px 25px;
background:green;
border:none;
color:white;
}
</style>
</head>

<body>

<div class="progress">
    <div class="bar" id="progressBar"></div>
</div>

<div class="steps-bar">
    <div class="step" id="step1">1</div>
    <div class="step" id="step2">2</div>
    <div class="step" id="step3">3</div>
    <div class="step" id="step4">4</div>
    <div class="step" id="step5">5</div>
    <div class="step" id="step6">6</div>
    <div class="step" id="step7">7</div>
</div>

<div>

<h2>Vote Submitted 🎉</h2>

<button onclick="location.href='index.html'">Back Home</button>

</div>

<script src="script.js"></script>



<script>
document.getElementById("step1").classList.add("done");
document.getElementById("step2").classList.add("done");
document.getElementById("step3").classList.add("done");
document.getElementById("step4").classList.add("done");
document.getElementById("step5").classList.add("done");
document.getElementById("step6").classList.add("done");
document.getElementById("step7").classList.add("active");
</script>

<script>
document.getElementById("progressBar").style.width = "100%";
</script>

</body>
</html>
