<!DOCTYPE html>
<html>
<head>
<title>Aadhaar Verification</title>

<!-- External CSS -->
<link rel="stylesheet" href="style.css">

<style>
body{
padding-top: 20px;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('https://www.godigit.com/content/dam/godigit/directportal/en/contenthm/aadhaar-verification.jpg');
background-size:cover;
font-family:Arial;
}

.card{text-align:center;}

input{
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:green;
color:white;
border:none;
}
</style>

</head>

<body>

<div class="progress">
    <div class="bar" id="progressBar"></div>
</div>

<div class="steps-bar">
    <div class="step" id="step1">1</div>
    <div class="step" id="step2">2</div>
    <div class="step" id="step3">3</div>
    <div class="step" id="step4">4</div>
    <div class="step" id="step5">5</div>
    <div class="step" id="step6">6</div>
    <div class="step" id="step7">7</div>
</div>

<form class="card" onsubmit="return validateAadhaar()">
<h2>Enter Aadhaar Number</h2>

<input type="text" id="aadhaar" placeholder="Enter Aadhaar" required>
<br><br>

<button type="submit">Submit</button>

</form>



<script>
document.getElementById("step1").classList.add("active");
</script>

<script>
document.getElementById("progressBar").style.width = "14%";
</script>

<!-- External JavaScript -->
<script src="script.js"></script>

<script>
function validateAadhaar(){  
    let a = document.getElementById("aadhaar").value;  

    const users = JSON.parse(localStorage.getItem("users")) || {};

    if(!users[a]){  
        alert("Aadhaar not found ❌");  
        return false;  
    }  

    localStorage.setItem("currentUser", JSON.stringify(users[a]));  
    window.location.href = "voterid.html";  
    return false;  
}
</script>

</body>
</html>
