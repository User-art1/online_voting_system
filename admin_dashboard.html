<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">

<style>
body{
font-family:Arial;
text-align:center;
background:url('https://images.unsplash.com/photo-1557804506-669a67965ba0');
background-size:cover;
background-position:center;
color:white;
}

table{
margin:auto;
border-collapse:collapse;
width:60%;
background:rgba(0,0,0,0.6);
}

th,td{
border:1px solid white;
padding:10px;
}

th{
background:#1e90ff;
color:white;
}

canvas {
    margin-top: 30px;
    background: rgba(0,0,0,0.5);
    padding: 20px;
    border-radius: 10px;
}

button {
    padding: 10px 20px;
    background: red;
    color: white;
    border: none;
    margin: 20px;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: darkred;
}
</style>
</head>

<body>

<h1>Voting Results</h1>
<button onclick="adminLogout()">Logout</button>
<table>

<tr>
<th>Candidate</th>
<th>Votes</th>
</tr>

<tr>
<td>Candidate A</td>
<td id="A"></td>
</tr>

<tr>
<td>Candidate B</td>
<td id="B"></td>
</tr>

<tr>
<td>Candidate C</td>
<td id="C"></td>
</tr>

</table>

<div class="chart-container">
    <canvas id="voteChart"></canvas>
</div>


<script>
let votes = JSON.parse(localStorage.getItem("votes")) || {A:0,B:0,C:0};

// fill table
document.getElementById("A").innerHTML = votes.A;
document.getElementById("B").innerHTML = votes.B;
document.getElementById("C").innerHTML = votes.C;

// chart
const ctx = document.getElementById('voteChart').getContext('2d');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Candidate A', 'Candidate B', 'Candidate C'],
        datasets: [{
            label: 'VOTES',
            data: [votes.A, votes.B, votes.C],
            backgroundColor: ['#ff4d4d', '#4da6ff', '#33cc33']
        }]
    },
    options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
        legend: {
            labels: {
                color: "white",
                boxWidth: 0   // ❌ removes the red box
            }
        }
    },
    scales: {
        y: {
            ticks: { color: "white" }
        },
        x: {
            ticks: { color: "white" }
        }
    }
}
});

setInterval(()=>{
    let votes = JSON.parse(localStorage.getItem("votes")) || {A:0,B:0,C:0};

    document.getElementById("A").innerHTML = votes.A;
    document.getElementById("B").innerHTML = votes.B;
    document.getElementById("C").innerHTML = votes.C;
}, 3000);

</script>

<script src="script.js"></script>



</body>
</html>
