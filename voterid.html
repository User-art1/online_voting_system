<!DOCTYPE html>
<html>
<head>
<title>Voter ID Verification</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    /* ✅ WORKING BACKGROUND */
    background-image: url('https://play-lh.googleusercontent.com/m6rxQdopRTdbFw_5Ff_dP3ZjgBmYpELQHjvwha7so0HnxJym1bt9w1lomzr-U2GbFA');
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;

    font-family: Arial;
}
</style>
</head>

<body>

<div class="progress">
    <div class="bar" id="progressBar"></div>
</div>

<div class="steps-bar">
    <div class="step" id="step1">1</div>
    <div class="step" id="step2">2</div>
    <div class="step" id="step3">3</div>
    <div class="step" id="step4">4</div>
    <div class="step" id="step5">5</div>
    <div class="step" id="step6">6</div>
    <div class="step" id="step7">7</div>
</div>

<form class="card" onsubmit="return validateVoterID()">

<h2>Enter Voter ID</h2>

<input type="text" id="voterid" placeholder="Enter Voter ID" required>
<br><br>

<button type="submit">Verify</button>

</form>

<script>
document.getElementById("progressBar").style.width = "30%";
</script>

<script>
function validateVoterID(){

let v = document.getElementById("voterid").value.trim().toUpperCase();

let user = JSON.parse(localStorage.getItem("currentUser"));

if(!user){
    alert("No user found ❌");
    return false;
}

if(!user.voterid){
    alert("Voter ID not linked ❌");
    return false;
}

if(user.voterid.toUpperCase() !== v){
    alert("Invalid Voter ID ❌");
    return false;
}

window.location.href = "details.html";
return false;
}
</script>



<script>
document.getElementById("step1").classList.add("done");
document.getElementById("step2").classList.add("active");
</script>

<script>
document.getElementById("progressBar").style.width = "28%";
</script>

</body>
</html>
