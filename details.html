<!DOCTYPE html>
<html>
<head>
<title>Voter Details</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    padding-top: 20px;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url('https://offload.media.kychub.com/wp-content/uploads/2024/08/11152142/Voter-ID-Verification.jpg');
    background-size:cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family:Arial;
    text-align:center;
}

button{
    padding:12px 25px;
    background:green;
    color:white;
    border:none;
}
</style>

</head>

<body>

<div class="progress">
    <div class="bar" id="progressBar"></div>
</div>

<div class="steps-bar">
    <div class="step" id="step1">1</div>
    <div class="step" id="step2">2</div>
    <div class="step" id="step3">3</div>
    <div class="step" id="step4">4</div>
    <div class="step" id="step5">5</div>
    <div class="step" id="step6">6</div>
    <div class="step" id="step7">7</div>
</div>

<div class="details-glass">
    <h2>Voter Eligible ✅</h2>
    <p id="name"></p>
    <p id="age"></p>
    <p id="const"></p>

    <button onclick="location.href='face.html'">Proceed</button>
</div>

<script>
document.getElementById("step1").classList.add("done");
document.getElementById("step2").classList.add("done");
document.getElementById("step3").classList.add("active");

document.getElementById("progressBar").style.width = "42%";

let user = JSON.parse(localStorage.getItem("currentUser"));

document.getElementById("name").innerHTML = "Name: " + user.name;
document.getElementById("age").innerHTML = "Age: " + user.age;
document.getElementById("const").innerHTML = "Constituency: " + user.constituency;
</script>

</body>
</html>
